# 开发时仅启动 Redis + MongoDB，后端在宿主机用 pnpm --filter backend dev 跑（支持热更新）
# 启动：docker compose up -d
# 后端连接：REDIS_URL=redis://localhost:6379  MONGODB_URI=mongodb://localhost:27017/memorize

services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: memorize
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  redis_data:
  mongodb_data:
